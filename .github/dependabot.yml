version: 2

updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      composer:
        patterns:
          - "*"

  - package-ecosystem: docker
    directories:
      - "/"
      - "/docker/8.5"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
