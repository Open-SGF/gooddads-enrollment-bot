version: 2

multi-ecosystem-groups:
  weekly-maintenance:
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies

updates:
  - package-ecosystem: composer
    directory: "/"
    open-pull-requests-limit: 1
    multi-ecosystem-group: weekly-maintenance
    patterns:
      - "*"

  - package-ecosystem: docker
    directories:
      - "/"
      - "/docker/8.5"
    open-pull-requests-limit: 1
    multi-ecosystem-group: weekly-maintenance
    patterns:
      - "*"

  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 1
    multi-ecosystem-group: weekly-maintenance
    patterns:
      - "*"
