name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laravel
          MYSQL_USER: laravel
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: 'testing'
      APP_KEY: 'base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
      APP_MAINTENANCE_DRIVER: 'file'
      BCRYPT_ROUNDS: '4'
      BROADCAST_CONNECTION: 'null'
      CACHE_STORE: 'array'
      DB_CONNECTION: 'sqlite'
      DB_DATABASE: ':memory:'
      MAIL_MAILER: 'array'
      NIGHTWATCH_ENABLED: 'false'
      PULSE_ENABLED: 'false'
      QUEUE_CONNECTION: 'sync'
      SESSION_DRIVER: 'array'
      TELESCOPE_ENABLED: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: sqlite3, pdo_sqlite, pdo_mysql
          cache: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run database migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel
          DB_USERNAME: laravel
          DB_PASSWORD: password
        run: php artisan migrate --no-interaction

      - name: Run formatting and lint checks
        run: composer test:lint

      - name: Run static analysis
        run: composer test:types

      - name: Check IDE helper files are up to date
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel
          DB_USERNAME: laravel
          DB_PASSWORD: password
        run: |
          composer ide-helper
          git diff --exit-code --stat || (echo "::error::IDE helper files are stale. Run 'composer ide-helper' locally and commit the changes." && exit 1)

      - name: Create testing database
        run: php -r "new PDO('mysql:host=127.0.0.1;port=3306', 'root', 'password')->exec('CREATE DATABASE IF NOT EXISTS testing; GRANT ALL PRIVILEGES ON \`testing%\`.* TO \'laravel\'@\'%\'; FLUSH PRIVILEGES;');"

      - name: Run test suite
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: laravel
          DB_PASSWORD: password
        run: composer test:unit
